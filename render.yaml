services:
  - type: web
    name: visionshield-backend
    runtime: docker
    dockerContext: ./server
    dockerfilePath: ./server/Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: CORS_ORIGINS
        value: https://visionshield-chi.vercel.app
      - key: LOG_LEVEL
        value: INFO
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8000