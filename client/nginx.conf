# Production reverse proxy: static SPA + API/WS passthrough to the backend
# container (service name "backend" on the compose network).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — unknown paths fall back to index.html.
    location / {
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass https://faceencoder.onrender.com;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket upgrade for the live video stream.
    location /ws/ {
        proxy_pass https://faceencoder.onrender.com;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
